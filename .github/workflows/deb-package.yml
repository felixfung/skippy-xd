name: Build and Release Debian Package

on:
  push:
    tags:
      - 'v*'

jobs:
  build-deb:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Read version
        id: version
        run: |
          VERSION=$(cat version.txt | sed -E 's/^v([0-9]+\.[0-9]+\.[0-9]+).*/\1/')
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Detected version: $VERSION"

      - name: Install build dependencies
        run: |
          sudo apt update
          sudo apt install -y devscripts build-essential dh-make \
            meson ninja-build \
            libx11-dev libxcb1-dev libxcb-util0-dev libxcb-ewmh-dev \
            libxcb-icccm4-dev libxcb-image0-dev libxcb-keysyms1-dev \
            libxcb-randr0-dev libxcb-shape0-dev libxcb-xinerama0-dev \
            libxcb-xfixes0-dev libxcb-composite0-dev libxcb-damage0-dev \
            libxcb-render-util0-dev libxcb-render0-dev libxcb-shm0-dev \
            libxcb-xkb-dev libxkbcommon-dev libxkbcommon-x11-dev \
            libconfig-dev libimlib2-dev libx11-xcb-dev \
            libpng-dev libjpeg-dev libgif-dev



      - name: Build Debian package
        run: |
          VERSION=$(cat version.txt | sed -E 's/^v([0-9]+\.[0-9]+\.[0-9]+).*/\1/')
          dpkg-buildpackage -us -uc

      - name: List built files
        run: |
          ls -la ..
          find .. -name "*.deb" -type f

      - name: Upload Debian package
        uses: actions/upload-artifact@v4
        with:
          name: deb-package
          path: ../skippy-xd_*.deb
          if-no-files-found: error

      - name: Release
        uses: softprops/action-gh-release@v1
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: ../skippy-xd_*.deb
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
